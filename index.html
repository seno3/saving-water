<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text-muted: #777;
      --accent: #7c5cfc;
      --accent-hover: #6a4aec;
      --user-bubble: #1e1a2e;
      --ai-bubble: #1a1a1a;
      --input-bg: #1a1a1a;
      --radius: 14px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .logo svg { opacity: 0.9; }

    #model-select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
      max-width: 220px;
    }
    #model-select:hover { border-color: #555; }
    #model-select:focus { border-color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px 8px;
      display: flex;
      align-items: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      font-size: 13px;
    }
    .icon-btn:hover { color: var(--text); border-color: #555; background: var(--surface2); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 14px;
      color: var(--text-muted);
      text-align: center;
      padding: 60px 20px;
      animation: fadein 0.4s ease;
    }
    .empty-state .big-icon {
      width: 56px; height: 56px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      border: 1px solid var(--border);
    }
    .empty-state h2 { font-size: 20px; color: var(--text); font-weight: 600; letter-spacing: -0.02em; }
    .empty-state p { font-size: 14px; max-width: 340px; }

    /* Message rows */
    .msg-row {
      display: flex;
      gap: 12px;
      animation: fadein 0.25s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 600;
      margin-top: 2px;
    }
    .avatar.ai {
      background: var(--accent);
      color: #fff;
    }
    .avatar.user {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      word-wrap: break-word;
    }
    .bubble.ai {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
    }
    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid #2d2540;
      border-radius: var(--radius) 4px var(--radius) var(--radius);
    }

    .bubble img {
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 8px;
      display: block;
    }

    /* Markdown-ish rendering */
    .bubble pre {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin: 8px 0;
    }
    .bubble code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #1e1e1e;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 13px;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble p { margin: 4px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { color: #fff; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }
    .bubble h1,.bubble h2,.bubble h3 { color: #fff; margin: 10px 0 4px; font-weight: 600; }
    .bubble h1 { font-size: 16px; }
    .bubble h2 { font-size: 15px; }
    .bubble h3 { font-size: 14px; }
    .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      color: var(--text-muted);
      margin: 6px 0;
    }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Image previews in input ── */
    #image-previews {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 16px;
    }
    .preview-thumb {
      position: relative;
      width: 64px; height: 64px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      animation: fadein 0.2s ease;
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .preview-thumb button {
      position: absolute;
      top: 2px; right: 2px;
      background: rgba(0,0,0,0.75);
      border: none;
      border-radius: 50%;
      width: 18px; height: 18px;
      color: #fff;
      cursor: pointer;
      font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    /* ── Input area ── */
    #input-area {
      padding: 12px 20px 20px;
      flex-shrink: 0;
    }

    .input-box {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.15s, box-shadow 0.15s;
      overflow: hidden;
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.12);
    }

    #image-previews { padding-top: 12px; }

    #prompt {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14.5px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: none;
      min-height: 52px;
      max-height: 200px;
      overflow-y: auto;
    }
    #prompt::placeholder { color: var(--text-muted); }
    #prompt::-webkit-scrollbar { width: 4px; }
    #prompt::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .input-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px 10px;
    }

    .toolbar-left { display: flex; gap: 4px; }

    .tool-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 8px;
      padding: 6px 8px;
      display: flex; align-items: center; gap: 5px;
      font-size: 13px;
      font-family: var(--font);
      transition: color 0.15s, background 0.15s;
    }
    .tool-btn:hover { color: var(--text); background: var(--surface2); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 9px;
      color: #fff;
      cursor: pointer;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    #stop-btn {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      cursor: pointer;
      padding: 0 14px;
      height: 36px;
      font-size: 13px;
      font-family: var(--font);
      transition: background 0.15s;
    }
    #stop-btn:hover { background: #2a2a2a; }

    .status-bar {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── Paste zone highlight ── */
    body.drag-over #input-area .input-box {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.2);
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="#7c5cfc" opacity="0.15"/>
        <path d="M8 12a4 4 0 1 0 8 0 4 4 0 0 0-8 0z" fill="#7c5cfc"/>
        <path d="M12 4v2M12 18v2M4 12H2M22 12h-2M6.34 6.34 4.93 4.93M19.07 19.07l-1.41-1.41M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" stroke="#7c5cfc" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Local AI
    </div>
    <div class="header-right">
      <select id="model-select" title="Select model">
        <option value="">Loading models…</option>
      </select>
      <button class="icon-btn" id="clear-btn" title="New chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="big-icon">✦</div>
      <h2>What's on your mind?</h2>
      <p>Ask anything. You can paste or upload images too.</p>
    </div>
  </div>

  <div id="input-area">
    <div class="input-box" id="input-box">
      <div id="image-previews"></div>
      <textarea id="prompt" placeholder="Message…" rows="1"></textarea>
      <div class="input-toolbar">
        <div class="toolbar-left">
          <label class="tool-btn" title="Attach image" style="cursor:pointer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <input type="file" id="file-input" accept="image/*" multiple style="display:none">
          </label>
          <button class="tool-btn" id="screenshot-btn" title="Paste screenshot (Ctrl+V)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Paste
          </button>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button id="stop-btn">■ Stop</button>
          <button id="send-btn" disabled title="Send (Enter)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div class="status-bar" id="status-bar">Connected to Ollama · localhost:11434</div>
  </div>
</div>

<script>
// ── State ──
let messages = [];        // [{role, content: string | [{type,text},{type,image_url}]}]
let pendingImages = [];   // [{dataUrl, base64, mimeType}]
let abortController = null;
let isStreaming = false;

const OLLAMA_BASE = 'http://localhost:11434';

// ── DOM refs ──
const messagesEl   = document.getElementById('messages');
const emptyState   = document.getElementById('empty-state');
const promptEl     = document.getElementById('prompt');
const sendBtn      = document.getElementById('send-btn');
const stopBtn      = document.getElementById('stop-btn');
const modelSelect  = document.getElementById('model-select');
const clearBtn     = document.getElementById('clear-btn');
const fileInput    = document.getElementById('file-input');
const imagePreviewsEl = document.getElementById('image-previews');
const statusBar    = document.getElementById('status-bar');

// ── Load models ──
async function loadModels() {
  try {
    const res = await fetch(`${OLLAMA_BASE}/api/tags`);
    const data = await res.json();
    const models = data.models || [];
    modelSelect.innerHTML = '';
    if (models.length === 0) {
      modelSelect.innerHTML = '<option value="">No models found</option>';
      return;
    }
    models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.name;
      opt.textContent = m.name;
      modelSelect.appendChild(opt);
    });
    // Prefer a vision-capable model
    const visionPref = ['llava', 'llama3.2-vision', 'minicpm-v', 'bakllava', 'moondream'];
    for (const pref of visionPref) {
      const match = models.find(m => m.name.toLowerCase().includes(pref));
      if (match) { modelSelect.value = match.name; break; }
    }
    statusBar.textContent = `${models.length} model${models.length !== 1 ? 's' : ''} available · localhost:11434`;
  } catch (e) {
    modelSelect.innerHTML = '<option value="">Ollama not running</option>';
    statusBar.textContent = '⚠ Cannot connect to Ollama at localhost:11434';
  }
}

// ── Markdown renderer (lightweight) ──
function renderMarkdown(text) {
  let html = text
    // Escape HTML first
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Code blocks
    .replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${lang||''}">${code.trim()}</code></pre>`)
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Strikethrough
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    // Headings
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // HR
    .replace(/^---$/gm, '<hr/>')
    // Blockquote
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    // Unordered lists
    .replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    // Ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Line breaks → paragraphs
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br/>');

  return `<p>${html}</p>`
    .replace(/<p><\/p>/g, '')
    .replace(/<p>(<(?:pre|ul|ol|h[1-6]|blockquote|hr)[^>]*>)/g, '$1')
    .replace(/(<\/(?:pre|ul|ol|h[1-6]|blockquote|hr)>)<\/p>/g, '$1');
}

// ── Render message ──
function createMessageEl(role, contentText, images = []) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '✦' : 'U';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;

  // Show attached images
  images.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    bubble.appendChild(img);
  });

  if (contentText) {
    const content = document.createElement('div');
    content.className = 'content';
    content.innerHTML = role === 'ai' ? renderMarkdown(contentText) : escapeHtml(contentText);
    bubble.appendChild(content);
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  return { row, bubble };
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMessage(role, text, images = []) {
  if (emptyState.parentNode) emptyState.remove();
  const { row } = createMessageEl(role, text, images);
  messagesEl.appendChild(row);
  scrollToBottom();
  return row;
}

function scrollToBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

// ── Typing indicator ──
function showTyping() {
  if (emptyState.parentNode) emptyState.remove();
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typing-row';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '✦';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollToBottom();
  return row;
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

// ── Send ──
async function sendMessage() {
  const text = promptEl.value.trim();
  if ((!text && pendingImages.length === 0) || isStreaming) return;

  const model = modelSelect.value;
  if (!model) { statusBar.textContent = '⚠ Select a model first'; return; }

  const imgs = [...pendingImages];
  clearPendingImages();
  promptEl.value = '';
  autoResize();
  updateSendBtn();

  // Build display
  const imgDataUrls = imgs.map(i => i.dataUrl);
  appendMessage('user', text, imgDataUrls);

  // Build Ollama message
  let ollamaContent;
  if (imgs.length > 0) {
    // Multi-modal: use images array format
    ollamaContent = text || 'Describe this image.';
    const imagesB64 = imgs.map(i => i.base64);
    messages.push({ role: 'user', content: ollamaContent, images: imagesB64 });
  } else {
    ollamaContent = text;
    messages.push({ role: 'user', content: ollamaContent });
  }

  // Stream response
  isStreaming = true;
  sendBtn.style.display = 'none';
  stopBtn.style.display = 'flex';

  const typingRow = showTyping();
  abortController = new AbortController();

  try {
    const res = await fetch(`${OLLAMA_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: abortController.signal,
      body: JSON.stringify({
        model,
        messages: messages.slice(0, -1).concat([messages[messages.length - 1]]),
        stream: true
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    removeTyping();

    // Create AI bubble for streaming
    const aiRow = document.createElement('div');
    aiRow.className = 'msg-row ai';
    const aiAvatar = document.createElement('div');
    aiAvatar.className = 'avatar ai';
    aiAvatar.textContent = '✦';
    const aiBubble = document.createElement('div');
    aiBubble.className = 'bubble ai';
    const aiContent = document.createElement('div');
    aiContent.className = 'content';
    aiBubble.appendChild(aiContent);
    aiRow.appendChild(aiAvatar);
    aiRow.appendChild(aiBubble);
    messagesEl.appendChild(aiRow);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let renderTimer = null;

    const flushRender = () => {
      aiContent.innerHTML = renderMarkdown(fullText);
      scrollToBottom();
    };

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      for (const line of chunk.split('\n')) {
        if (!line.trim()) continue;
        try {
          const json = JSON.parse(line);
          if (json.message?.content) {
            fullText += json.message.content;
            // Throttle renders
            if (!renderTimer) {
              renderTimer = setTimeout(() => { flushRender(); renderTimer = null; }, 30);
            }
          }
        } catch {}
      }
    }
    if (renderTimer) clearTimeout(renderTimer);
    flushRender();

    messages.push({ role: 'assistant', content: fullText });

  } catch (err) {
    removeTyping();
    if (err.name !== 'AbortError') {
      appendMessage('ai', `Error: ${err.message}\n\nMake sure Ollama is running and CORS is enabled:\n\`OLLAMA_ORIGINS=* ollama serve\``);
    }
  } finally {
    isStreaming = false;
    abortController = null;
    sendBtn.style.display = '';
    stopBtn.style.display = 'none';
    updateSendBtn();
  }
}

// ── Images ──
function addImages(files) {
  [...files].forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      pendingImages.push({ dataUrl, base64, mimeType: file.type });
      renderImagePreviews();
      updateSendBtn();
    };
    reader.readAsDataURL(file);
  });
}

function renderImagePreviews() {
  imagePreviewsEl.innerHTML = '';
  pendingImages.forEach((img, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'preview-thumb';
    const imgEl = document.createElement('img');
    imgEl.src = img.dataUrl;
    const rm = document.createElement('button');
    rm.textContent = '×';
    rm.onclick = () => {
      pendingImages.splice(i, 1);
      renderImagePreviews();
      updateSendBtn();
    };
    thumb.appendChild(imgEl);
    thumb.appendChild(rm);
    imagePreviewsEl.appendChild(thumb);
  });
}

function clearPendingImages() {
  pendingImages = [];
  imagePreviewsEl.innerHTML = '';
}

// ── Auto-resize textarea ──
function autoResize() {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + 'px';
}

function updateSendBtn() {
  const hasInput = promptEl.value.trim() || pendingImages.length > 0;
  sendBtn.disabled = !hasInput || isStreaming;
}

// ── Event listeners ──
promptEl.addEventListener('input', () => { autoResize(); updateSendBtn(); });

promptEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

stopBtn.addEventListener('click', () => {
  if (abortController) abortController.abort();
});

clearBtn.addEventListener('click', () => {
  messages = [];
  clearPendingImages();
  messagesEl.innerHTML = '';
  messagesEl.appendChild(emptyState);
  promptEl.value = '';
  autoResize();
  updateSendBtn();
});

fileInput.addEventListener('change', e => {
  addImages(e.target.files);
  fileInput.value = '';
});

// Paste images (Ctrl+V)
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  const imageItems = [...items].filter(i => i.type.startsWith('image/'));
  if (imageItems.length > 0) {
    e.preventDefault();
    addImages(imageItems.map(i => i.getAsFile()));
  }
});

// Drag & drop
document.addEventListener('dragover', e => {
  e.preventDefault();
  document.body.classList.add('drag-over');
});
document.addEventListener('dragleave', e => {
  if (!e.relatedTarget) document.body.classList.remove('drag-over');
});
document.addEventListener('drop', e => {
  e.preventDefault();
  document.body.classList.remove('drag-over');
  addImages(e.dataTransfer.files);
});

document.getElementById('screenshot-btn').addEventListener('click', () => {
  promptEl.focus();
  statusBar.textContent = 'Press Ctrl+V / Cmd+V to paste a screenshot';
  setTimeout(() => { statusBar.textContent = `${modelSelect.options.length} model(s) available · localhost:11434`; }, 3000);
});

// ── Init ──
loadModels();
promptEl.focus();
</script>
</body>
