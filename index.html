<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --sidebar: #141414;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-muted: #666;
      --accent: #7c5cfc;
      --accent-hover: #6a4aec;
      --user-bubble: #1e1a2e;
      --radius: 14px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --sidebar-w: 240px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; }

    /* ── Root layout ── */
    #app { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 12px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.02em;
      flex: 1;
      min-width: 0;
    }

    #new-chat-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 5px 7px;
      display: flex;
      align-items: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    #new-chat-btn:hover { color: var(--text); border-color: #555; background: var(--surface2); }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 6px;
    }
    #chat-list::-webkit-scrollbar { width: 4px; }
    #chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-list-empty {
      padding: 20px 10px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
      group: true;
    }
    .chat-item:hover { background: var(--surface2); }
    .chat-item.active { background: #1e1a2e; }

    .chat-item-text {
      flex: 1;
      min-width: 0;
    }
    .chat-item-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .chat-item-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .chat-item-del {
      display: none;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }
    .chat-item:hover .chat-item-del { display: flex; }
    .chat-item-del:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    /* ── Main panel ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
    }

    #chat-title-display {
      font-size: 14px;
      color: var(--text-muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #model-select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
      max-width: 200px;
    }
    #model-select:hover { border-color: #555; }
    #model-select:focus { border-color: var(--accent); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 14px;
      color: var(--text-muted);
      text-align: center;
      padding: 60px 20px;
      animation: fadein 0.4s ease;
    }
    .empty-state .big-icon {
      width: 56px; height: 56px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      border: 1px solid var(--border);
    }
    .empty-state h2 { font-size: 20px; color: var(--text); font-weight: 600; letter-spacing: -0.02em; }
    .empty-state p { font-size: 14px; max-width: 320px; }

    /* Message rows */
    .msg-row { display: flex; gap: 12px; animation: fadein 0.25s ease; }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      margin-top: 2px;
    }
    .avatar.ai { background: var(--accent); color: #fff; }
    .avatar.user { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    .bubble {
      max-width: 78%;
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      word-wrap: break-word;
    }
    .bubble.ai { background: var(--surface); border: 1px solid var(--border); border-radius: 4px var(--radius) var(--radius) var(--radius); }
    .bubble.user { background: var(--user-bubble); border: 1px solid #2d2540; border-radius: var(--radius) 4px var(--radius) var(--radius); }

    .bubble img { max-width: 100%; border-radius: 8px; margin-bottom: 8px; display: block; }
    .bubble pre { background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; font-size: 13px; font-family: 'SF Mono','Fira Code',monospace; margin: 8px 0; }
    .bubble code { font-family: 'SF Mono','Fira Code',monospace; background: #1e1e1e; border-radius: 4px; padding: 1px 5px; font-size: 13px; }
    .bubble pre code { background: none; padding: 0; }
    .bubble p { margin: 4px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { color: #fff; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }
    .bubble h1,.bubble h2,.bubble h3 { color: #fff; margin: 10px 0 4px; font-weight: 600; }
    .bubble h1 { font-size: 16px; } .bubble h2 { font-size: 15px; } .bubble h3 { font-size: 14px; }
    .bubble blockquote { border-left: 3px solid var(--accent); padding-left: 10px; color: var(--text-muted); margin: 6px 0; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dots span { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-5px); opacity: 1; } }
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Input ── */
    #image-previews { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px 0; }

    .preview-thumb {
      position: relative;
      width: 64px; height: 64px;
      border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border);
      animation: fadein 0.2s ease;
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .preview-thumb button {
      position: absolute; top: 2px; right: 2px;
      background: rgba(0,0,0,0.75); border: none; border-radius: 50%;
      width: 18px; height: 18px; color: #fff; cursor: pointer;
      font-size: 11px; display: flex; align-items: center; justify-content: center;
    }

    #input-area { padding: 10px 20px 18px; flex-shrink: 0; }

    .input-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.15s, box-shadow 0.15s;
      overflow: hidden;
    }
    .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,252,0.12); }

    #prompt {
      width: 100%; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font); font-size: 14.5px; line-height: 1.6;
      padding: 13px 16px; resize: none; min-height: 50px; max-height: 200px; overflow-y: auto;
    }
    #prompt::placeholder { color: var(--text-muted); }
    #prompt::-webkit-scrollbar { width: 4px; }
    #prompt::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .input-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px 8px; }
    .toolbar-left { display: flex; gap: 4px; }

    .tool-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      border-radius: 8px; padding: 6px 8px; display: flex; align-items: center; gap: 5px;
      font-size: 13px; font-family: var(--font); transition: color 0.15s, background 0.15s;
    }
    .tool-btn:hover { color: var(--text); background: var(--surface2); }

    #send-btn {
      background: var(--accent); border: none; border-radius: 9px; color: #fff; cursor: pointer;
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s, transform 0.1s; flex-shrink: 0;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    #stop-btn {
      display: none; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); cursor: pointer; padding: 0 14px;
      height: 34px; font-size: 13px; font-family: var(--font); transition: background 0.15s;
    }
    #stop-btn:hover { background: #2a2a2a; }

    .status-bar { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 7px; }

    body.drag-over .input-box { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,252,0.2); }
  </style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="#7c5cfc" opacity="0.15"/>
          <path d="M8 12a4 4 0 1 0 8 0 4 4 0 0 0-8 0z" fill="#7c5cfc"/>
          <path d="M12 4v2M12 18v2M4 12H2M22 12h-2" stroke="#7c5cfc" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Local AI
      </div>
      <button id="new-chat-btn" title="New chat">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </div>
    <div id="chat-list">
      <div class="chat-list-empty" id="chat-list-empty">No chats yet</div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <header>
      <div id="chat-title-display">New chat</div>
      <select id="model-select" title="Select model">
        <option value="">Loading models…</option>
      </select>
    </header>

    <div id="messages">
      <div class="empty-state" id="empty-state">
        <div class="big-icon">✦</div>
        <h2>What's on your mind?</h2>
        <p>Ask anything. Paste or upload images too.</p>
      </div>
    </div>

    <div id="input-area">
      <div class="input-box">
        <div id="image-previews"></div>
        <textarea id="prompt" placeholder="Message…" rows="1"></textarea>
        <div class="input-toolbar">
          <div class="toolbar-left">
            <label class="tool-btn" title="Attach image" style="cursor:pointer">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="3"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
              <input type="file" id="file-input" accept="image/*" multiple style="display:none">
            </label>
            <button class="tool-btn" id="screenshot-btn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Paste
            </button>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button id="stop-btn">■ Stop</button>
            <button id="send-btn" disabled title="Send (Enter)">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="status-bar" id="status-bar">Connecting to Ollama…</div>
    </div>
  </div>
</div>

<script>
// ── Constants ──
const OLLAMA_BASE = 'http://localhost:11434';
const STORAGE_KEY = 'localai_chats';

// ── State ──
let currentChatId = null;
let messages = [];
let pendingImages = [];
let abortController = null;
let isStreaming = false;

// ── DOM ──
const messagesEl     = document.getElementById('messages');
const emptyState     = document.getElementById('empty-state');
const promptEl       = document.getElementById('prompt');
const sendBtn        = document.getElementById('send-btn');
const stopBtn        = document.getElementById('stop-btn');
const modelSelect    = document.getElementById('model-select');
const fileInput      = document.getElementById('file-input');
const imagePreviewsEl= document.getElementById('image-previews');
const statusBar      = document.getElementById('status-bar');
const chatListEl     = document.getElementById('chat-list');
const chatListEmpty  = document.getElementById('chat-list-empty');
const titleDisplay   = document.getElementById('chat-title-display');

// ── Storage helpers ──
function loadAllChats() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveAllChats(chats) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(chats)); }
  catch (e) {
    if (e.name === 'QuotaExceededError') {
      statusBar.textContent = '⚠ Storage full — older chats may not save (images use lots of space)';
    }
  }
}

function getChat(id) {
  return loadAllChats().find(c => c.id === id) || null;
}

function upsertChat(chat) {
  const chats = loadAllChats();
  const idx = chats.findIndex(c => c.id === chat.id);
  if (idx >= 0) chats[idx] = chat;
  else chats.unshift(chat);
  saveAllChats(chats);
}

function deleteChat(id) {
  const chats = loadAllChats().filter(c => c.id !== id);
  saveAllChats(chats);
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (diffDays === 1) return 'Yesterday';
  if (diffDays < 7) return d.toLocaleDateString([], { weekday: 'short' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

// ── Sidebar rendering ──
function renderSidebar() {
  const chats = loadAllChats();
  // Remove all items (keep empty label)
  [...chatListEl.querySelectorAll('.chat-item')].forEach(el => el.remove());

  chatListEmpty.style.display = chats.length === 0 ? '' : 'none';

  chats.forEach(chat => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
    item.dataset.id = chat.id;

    const text = document.createElement('div');
    text.className = 'chat-item-text';

    const title = document.createElement('div');
    title.className = 'chat-item-title';
    title.textContent = chat.title || 'New chat';

    const meta = document.createElement('div');
    meta.className = 'chat-item-meta';
    meta.textContent = (chat.model ? chat.model.split(':')[0] + ' · ' : '') + formatTime(chat.updatedAt);

    text.appendChild(title);
    text.appendChild(meta);

    const del = document.createElement('button');
    del.className = 'chat-item-del';
    del.title = 'Delete chat';
    del.textContent = '×';
    del.onclick = e => {
      e.stopPropagation();
      deleteChat(chat.id);
      if (chat.id === currentChatId) newChat();
      else renderSidebar();
    };

    item.appendChild(text);
    item.appendChild(del);
    item.onclick = () => loadChat(chat.id);
    chatListEl.appendChild(item);
  });
}

// ── Chat lifecycle ──
function newChat() {
  currentChatId = null;
  messages = [];
  clearPendingImages();
  messagesEl.innerHTML = '';
  messagesEl.appendChild(emptyState);
  promptEl.value = '';
  autoResize();
  updateSendBtn();
  titleDisplay.textContent = 'New chat';
  renderSidebar();
  promptEl.focus();
}

function loadChat(id) {
  const chat = getChat(id);
  if (!chat) return;

  currentChatId = id;
  messages = chat.messages || [];

  // Restore model if available
  if (chat.model && modelSelect.querySelector(`option[value="${chat.model}"]`)) {
    modelSelect.value = chat.model;
  }

  // Render messages
  messagesEl.innerHTML = '';
  messages.forEach(msg => {
    if (msg.role === 'user') {
      const imgUrls = (msg.images || []).map(b64 => 'data:image/png;base64,' + b64);
      appendMessage('user', msg.content, imgUrls, false);
    } else if (msg.role === 'assistant') {
      appendMessage('ai', msg.content, [], false);
    }
  });

  titleDisplay.textContent = chat.title || 'New chat';
  clearPendingImages();
  promptEl.value = '';
  autoResize();
  updateSendBtn();
  renderSidebar();
  scrollToBottom();
  promptEl.focus();
}

function saveCurrentChat(fullText) {
  const allMsgs = [...messages];
  const firstUserMsg = allMsgs.find(m => m.role === 'user');
  const title = firstUserMsg
    ? (firstUserMsg.content || 'Image').slice(0, 60)
    : 'New chat';

  const now = Date.now();
  const model = modelSelect.value;

  if (!currentChatId) {
    currentChatId = String(now);
    upsertChat({ id: currentChatId, title, model, createdAt: now, updatedAt: now, messages: allMsgs });
  } else {
    const existing = getChat(currentChatId) || {};
    upsertChat({ ...existing, id: currentChatId, title, model, updatedAt: now, messages: allMsgs });
  }

  titleDisplay.textContent = title;
  renderSidebar();
}

// ── Markdown ──
function renderMarkdown(text) {
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^---$/gm, '<hr/>')
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br/>');
  return `<p>${html}</p>`
    .replace(/<p><\/p>/g, '')
    .replace(/<p>(<(?:pre|ul|ol|h[1-6]|blockquote|hr)[^>]*>)/g, '$1')
    .replace(/(<\/(?:pre|ul|ol|h[1-6]|blockquote|hr)>)<\/p>/g, '$1');
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Message rendering ──
function appendMessage(role, text, images = [], animate = true) {
  if (emptyState.parentNode) emptyState.remove();

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  if (!animate) row.style.animation = 'none';

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '✦' : 'U';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;

  images.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    bubble.appendChild(img);
  });

  if (text) {
    const content = document.createElement('div');
    content.className = 'content';
    content.innerHTML = role === 'ai' ? renderMarkdown(text) : escapeHtml(text);
    bubble.appendChild(content);
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  if (animate) scrollToBottom();
  return row;
}

function scrollToBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

function showTyping() {
  if (emptyState.parentNode) emptyState.remove();
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typing-row';
  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '✦';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollToBottom();
}

function removeTyping() {
  document.getElementById('typing-row')?.remove();
}

// ── Send ──
async function sendMessage() {
  const text = promptEl.value.trim();
  if ((!text && pendingImages.length === 0) || isStreaming) return;

  const model = modelSelect.value;
  if (!model) { statusBar.textContent = '⚠ Select a model first'; return; }

  const imgs = [...pendingImages];
  clearPendingImages();
  promptEl.value = '';
  autoResize();
  updateSendBtn();

  const imgDataUrls = imgs.map(i => i.dataUrl);
  appendMessage('user', text, imgDataUrls);

  if (imgs.length > 0) {
    messages.push({ role: 'user', content: text || 'Describe this image.', images: imgs.map(i => i.base64) });
  } else {
    messages.push({ role: 'user', content: text });
  }

  isStreaming = true;
  sendBtn.style.display = 'none';
  stopBtn.style.display = 'flex';
  showTyping();
  abortController = new AbortController();

  try {
    const res = await fetch(`${OLLAMA_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: abortController.signal,
      body: JSON.stringify({ model, messages, stream: true })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    removeTyping();

    const aiRow = document.createElement('div');
    aiRow.className = 'msg-row ai';
    const aiAvatar = document.createElement('div');
    aiAvatar.className = 'avatar ai';
    aiAvatar.textContent = '✦';
    const aiBubble = document.createElement('div');
    aiBubble.className = 'bubble ai';
    const aiContent = document.createElement('div');
    aiContent.className = 'content';
    aiBubble.appendChild(aiContent);
    aiRow.appendChild(aiAvatar);
    aiRow.appendChild(aiBubble);
    messagesEl.appendChild(aiRow);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let renderTimer = null;

    const flushRender = () => { aiContent.innerHTML = renderMarkdown(fullText); scrollToBottom(); };

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value, { stream: true }).split('\n')) {
        if (!line.trim()) continue;
        try {
          const json = JSON.parse(line);
          if (json.message?.content) {
            fullText += json.message.content;
            if (!renderTimer) renderTimer = setTimeout(() => { flushRender(); renderTimer = null; }, 30);
          }
        } catch {}
      }
    }
    if (renderTimer) clearTimeout(renderTimer);
    flushRender();

    messages.push({ role: 'assistant', content: fullText });
    saveCurrentChat(fullText);

  } catch (err) {
    removeTyping();
    if (err.name !== 'AbortError') {
      appendMessage('ai', `Error: ${err.message}\n\nMake sure Ollama is running:\n\`OLLAMA_ORIGINS=* ollama serve\``);
    } else {
      // Save partial if aborted mid-stream
      if (messages[messages.length - 1]?.role === 'user') {
        // no assistant message added, skip save
      } else {
        saveCurrentChat('');
      }
    }
  } finally {
    isStreaming = false;
    abortController = null;
    sendBtn.style.display = '';
    stopBtn.style.display = 'none';
    updateSendBtn();
  }
}

// ── Images ──
function addImages(files) {
  [...files].forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      pendingImages.push({ dataUrl, base64: dataUrl.split(',')[1], mimeType: file.type });
      renderImagePreviews();
      updateSendBtn();
    };
    reader.readAsDataURL(file);
  });
}

function renderImagePreviews() {
  imagePreviewsEl.innerHTML = '';
  pendingImages.forEach((img, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'preview-thumb';
    const imgEl = document.createElement('img');
    imgEl.src = img.dataUrl;
    const rm = document.createElement('button');
    rm.textContent = '×';
    rm.onclick = () => { pendingImages.splice(i, 1); renderImagePreviews(); updateSendBtn(); };
    thumb.appendChild(imgEl);
    thumb.appendChild(rm);
    imagePreviewsEl.appendChild(thumb);
  });
}

function clearPendingImages() {
  pendingImages = [];
  imagePreviewsEl.innerHTML = '';
}

// ── Textarea auto-resize ──
function autoResize() {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + 'px';
}

function updateSendBtn() {
  sendBtn.disabled = !(promptEl.value.trim() || pendingImages.length > 0) || isStreaming;
}

// ── Load models ──
async function loadModels() {
  try {
    const res = await fetch(`${OLLAMA_BASE}/api/tags`);
    const { models = [] } = await res.json();
    modelSelect.innerHTML = '';
    if (!models.length) { modelSelect.innerHTML = '<option value="">No models found</option>'; return; }
    models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.name;
      opt.textContent = m.name;
      modelSelect.appendChild(opt);
    });
    // Prefer vision model
    for (const pref of ['llava','llama3.2-vision','minicpm-v','bakllava','moondream']) {
      const match = models.find(m => m.name.toLowerCase().includes(pref));
      if (match) { modelSelect.value = match.name; break; }
    }
    statusBar.textContent = `${models.length} model${models.length !== 1 ? 's' : ''} · localhost:11434`;
  } catch {
    modelSelect.innerHTML = '<option value="">Ollama not running</option>';
    statusBar.textContent = '⚠ Cannot connect — run: OLLAMA_ORIGINS=* ollama serve';
  }
}

// ── Events ──
promptEl.addEventListener('input', () => { autoResize(); updateSendBtn(); });
promptEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
sendBtn.addEventListener('click', sendMessage);
stopBtn.addEventListener('click', () => abortController?.abort());
document.getElementById('new-chat-btn').addEventListener('click', newChat);

fileInput.addEventListener('change', e => { addImages(e.target.files); fileInput.value = ''; });

document.addEventListener('paste', e => {
  const imgs = [...(e.clipboardData?.items || [])].filter(i => i.type.startsWith('image/'));
  if (imgs.length) { e.preventDefault(); addImages(imgs.map(i => i.getAsFile())); }
});

document.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('drag-over'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) document.body.classList.remove('drag-over'); });
document.addEventListener('drop', e => { e.preventDefault(); document.body.classList.remove('drag-over'); addImages(e.dataTransfer.files); });

document.getElementById('screenshot-btn').addEventListener('click', () => {
  promptEl.focus();
  statusBar.textContent = 'Press Ctrl+V / Cmd+V to paste a screenshot';
  setTimeout(() => loadModels(), 3000);
});

// ── Init ──
loadModels();
renderSidebar();
promptEl.focus();
</script>
</body>
</html>
